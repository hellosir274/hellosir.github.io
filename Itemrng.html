<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Iready.com</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:linear-gradient(135deg, #1a0033 0%, #330066 50%, #001a4d 100%); min-height:100vh; font-family:'Arial', sans-serif; display:flex; align-items:center; justify-content:center; gap:40px; padding:20px; }
    .container { max-width:600px; width:100%; background:rgba(0,0,0,0.5); border:2px solid #6600cc; border-radius:15px; padding:30px; box-shadow:0 0 30px rgba(102,0,204,0.5); }
    h1 { text-align:center; color:#fff; margin-bottom:10px; text-shadow:0 0 10px #6600cc; }
    .subtitle { text-align:center; color:#aaa; margin-bottom:30px; font-size:14px; }
    
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px; }
    .stat-box { background:rgba(102,0,204,0.2); border:1px solid #6600cc; border-radius:8px; padding:15px; text-align:center; }
    .stat-label { color:#aaa; font-size:12px; margin-bottom:5px; }
    .stat-value { color:#ff00ff; font-size:24px; font-weight:bold; }
    
    .roll-section { text-align:center; margin-bottom:30px; }
    .roll-btn { background:linear-gradient(135deg, #6600cc, #9933ff); color:#fff; border:none; padding:15px 40px; font-size:18px; font-weight:bold; border-radius:8px; cursor:pointer; margin:10px; transition:all 0.3s; box-shadow:0 0 20px rgba(102,0,204,0.6); }
    .roll-btn:hover { transform:scale(1.05); box-shadow:0 0 30px rgba(153,51,255,1); }
    .roll-btn:disabled { opacity:0.5; cursor:not-allowed; }
    
    .pull-display { background:rgba(0,0,0,0.7); border:2px solid #6600cc; border-radius:10px; padding:40px 20px; margin:20px 0; min-height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .item-card { position:relative; width:100px; height:100px; display:flex; align-items:center; justify-content:center; border-radius:10px; font-size:40px; animation:popIn 0.6s ease-out; }
    @keyframes popIn { from { transform:scale(0) rotate(-20deg); } to { transform:scale(1) rotate(0); } }
    
    .rarity-common { background:#888; box-shadow:0 0 10px #888; }
    .rarity-uncommon { background:#2ecc71; box-shadow:0 0 20px #2ecc71, 0 0 40px #2ecc71; }
    .rarity-rare { background:#3498db; box-shadow:0 0 20px #3498db, 0 0 40px #3498db; }
    .rarity-epic { background:#9b59b6; box-shadow:0 0 20px #9b59b6, 0 0 40px #9b59b6; }
    .rarity-legendary { background:#f39c12; box-shadow:0 0 30px #f39c12, 0 0 60px #f39c12, inset 0 0 20px rgba(255,255,0,0.5); animation:pulse 0.5s infinite alternate; }
    .rarity-mythic { background:#ff0000; box-shadow:0 0 30px #ff0000, 0 0 60px #ff0000, inset 0 0 20px rgba(255,0,0,0.5); animation:pulse 0.5s infinite alternate; }    
    .rarity-exotic { background:#02c8fe; box-shadow:0 0 30px #02c8fe, 0 0 60px #02c8fe, inset 0 0 20px rgba(0,200,254,0.5); animation:pulse 0.5s infinite alternate; }
    .rarity-secret { background:#999; box-shadow:0 0 20px #999, 0 0 40px #999, inset 0 0 15px rgba(153,153,153,0.5); }
    .rarity-limited { background:#ff00ff; box-shadow:0 0 30px #ff00ff, 0 0 60px #ff00ff, inset 0 0 20px rgba(255,0,255,0.5); animation:pulse 0.5s infinite alternate;   }
    @keyframes pulse { from { box-shadow:0 0 30px #f39c12, 0 0 60px #f39c12, inset 0 0 20px rgba(255,255,0,0.5); } to { box-shadow:0 0 40px #f39c12, 0 0 80px #f39c12, inset 0 0 30px rgba(255,255,0,0.8); } }
    
    .item-name { color:#fff; margin-top:15px; font-weight:bold; text-align:center; }
    .rarity-label { color:#aaa; font-size:12px; margin-top:5px; }
    
    .rarity-common-text { color:#888; }
    .rarity-uncommon-text { color:#2ecc71; }
    .rarity-rare-text { color:#3498db; }
    .rarity-epic-text { color:#9b59b6; }
    .rarity-legendary-text { color:#f39c12; }
    .rarity.mythic-text { color:#ff0000; }
    .rarity-exotic-text { color:#02c8fe; }
    .rarity-secret-text { color:#999; }
    .rarity-limited-text { color:#ff00ff; }
    
    .back-link { display:flex; align-items:center; }
    .back-link a { color:#fff; text-decoration:none; font-size:20px; font-weight:bold; background:linear-gradient(135deg, #6600cc, #9933ff); padding:15px 25px; border-radius:8px; box-shadow:0 0 20px rgba(102,0,204,0.6); transition:all 0.3s; }
    .back-link a:hover { transform:scale(1.05); box-shadow:0 0 30px rgba(153,51,255,1); }
    
    .collection-btn { background:linear-gradient(135deg, #6600cc, #9933ff); color:#fff; border:none; padding:12px 25px; font-size:16px; font-weight:bold; border-radius:8px; cursor:pointer; margin-bottom:20px; width:100%; box-shadow:0 0 20px rgba(102,0,204,0.6); transition:all 0.3s; }
    .collection-btn:hover { transform:scale(1.02); box-shadow:0 0 30px rgba(153,51,255,1); }
    
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; }
    .modal.active { display:flex; }
    .modal-content { position:relative; background:linear-gradient(135deg, #1a0033 0%, #330066 100%); border:2px solid #6600cc; border-radius:15px; padding:30px; max-width:800px; max-height:80vh; overflow-y:auto; width:90%; box-shadow:0 0 50px rgba(102,0,204,0.8); }
    .modal-header { color:#fff; font-size:24px; font-weight:bold; margin-bottom:20px; }
    .modal-close { position:absolute; top:10px; right:15px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; }
    .aura-table { width:100%; }
    .aura-row { display:grid; grid-template-columns:auto 1fr auto auto auto; gap:15px; padding:12px; border-bottom:1px solid rgba(102,0,204,0.3); align-items:center; color:#ccc; }
    .aura-row:hover { background:rgba(102,0,204,0.2); }
    .aura-emoji { font-size:24px; text-align:center; }
    .aura-name { font-weight:bold; color:#fff; }
    .aura-rarity { color:#ff00ff; font-size:12px; }
    .aura-chance { color:#00ff00; font-size:12px; }
    .aura-collected { color:#2ecc71; font-weight:bold; }
    .category-buttons { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .category-btn { padding:8px 15px; border:2px solid; color:#fff; cursor:pointer; border-radius:8px; font-size:14px; font-weight:bold; transition:all 0.3s; }
    .category-btn.common { background:rgba(128,128,128,0.4); border-color:#808080; }
    .category-btn.common:hover { background:rgba(128,128,128,0.6); }
    .category-btn.common.active { background:#808080; box-shadow:0 0 20px rgba(128,128,128,0.8); }
    .category-btn.uncommon { background:rgba(0,255,0,0.4); border-color:#00ff00; }
    .category-btn.uncommon:hover { background:rgba(0,255,0,0.6); }
    .category-btn.uncommon.active { background:#00ff00; color:#000; box-shadow:0 0 20px rgba(0,255,0,0.8); }
    .category-btn.rare { background:rgba(0,0,255,0.4); border-color:#0000ff; }
    .category-btn.rare:hover { background:rgba(0,0,255,0.6); }
    .category-btn.rare.active { background:#0000ff; box-shadow:0 0 20px rgba(0,0,255,0.8); }
    .category-btn.epic { background:rgba(128,0,128,0.4); border-color:#800080; }
    .category-btn.epic:hover { background:rgba(128,0,128,0.6); }
    .category-btn.epic.active { background:#800080; box-shadow:0 0 20px rgba(128,0,128,0.8); }
    .category-btn.legendary { background:rgba(255,165,0,0.4); border-color:#ffa500; }
    .category-btn.legendary:hover { background:rgba(255,165,0,0.6); }
    .category-btn.legendary.active { background:#ffa500; color:#000; box-shadow:0 0 20px rgba(255,165,0,0.8); }
    .category-btn.mythic { background:rgba(255,0,0,0.4); border-color:#ff0000; }
    .category-btn.mythic:hover { background:rgba(255,0,0,0.6); }
    .category-btn.mythic.active { background:#ff0000; box-shadow:0 0 20px rgba(255,0,0,0.8); }
    .category-btn.exotic { background:rgba(0,200,254,0.4); border-color:#00c8fe; }
    .category-btn.exotic:hover { background:rgba(0,200,254,0.6); }
    .category-btn.exotic.active { background:#00c8fe; color:#000; box-shadow:0 0 20px rgba(0,200,254,0.8); }
    .category-btn.secret { background:rgba(50,50,50,0.4); border-color:#333333; }
    .category-btn.secret:hover { background:rgba(50,50,50,0.6); }
    .category-btn.secret.active { background:#333333; box-shadow:0 0 20px rgba(80,80,80,0.8); }
    .category-btn.limited { background:rgba(255,0,255,0.4); border-color:#ff00ff; }
    .category-btn.limited:hover { background:rgba(255,0,255,0.6); }
    .category-btn.limited.active { background:#ff00ff; color:#000; box-shadow:0 0 20px rgba(255,0,255,0.8); }
    .aura-category { display:none; }
    .aura-category.active { display:block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Item RNG</h1>
    <p class="subtitle">Roll for incredible items!</p>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">TOTAL PULLS</div>
        <div class="stat-value" id="total-pulls">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">BEST RARITY</div>
        <div class="stat-value" id="best-rarity">None</div>
      </div>
    </div>
    
    <div class="roll-section">
      <button class="roll-btn" id="pull-1">Pull x1</button>
      <button class="roll-btn" id="reroll-btn" style="display:none;">Reroll</button>
    </div>
    
    <div class="pull-display" id="pull-display">
      <p style="color:#999;">Click a button to pull!</p>
    </div>
    
    <button class="collection-btn" id="view-collection-btn">📖 View Collection</button>
  </div>
  
  <div class="modal" id="collection-modal">
    <div class="modal-content">
      <button class="modal-close" id="close-modal">✕</button>
      <div class="modal-header"> Item Collection & Drop Rates</div>
      <div class="category-buttons" id="category-buttons"></div>
      <div id="aura-categories"></div>
    </div>
  </div>
  
  <div class="back-link"><a href="Game%20hob.html">← back to hub</a></div>
</body>

  <script>
  const items = [
    { name: '🗑️ Trash', rarity: 'common', emoji: '🗑️' },
    { name: '☘️ 3 Leaf Clover', rarity: 'common', emoji: '☘️' },
    { name: '🧵 String', rarity: 'common', emoji: '🧵' },
    { name: '🕸️ Cobweb', rarity: 'common', emoji: '🕸️' },
    { name: '💎 Diamond', rarity: 'uncommon', emoji: '💎' },
    { name: '🫧 Bubbles', rarity: 'uncommon', emoji: '🫧' },
    { name: '🍟 Fries', rarity: 'uncommon', emoji: '🍟' },
    { name: '🔮 Fortune Teller', rarity: 'rare', emoji: '🔮' },
    { name: '🛘 Rocks', rarity: 'rare', emoji: '🛘' },
    { name: '👑 Royal Crown', rarity: 'epic', emoji: '👑' },
    { name: '☄️ Meteor', rarity: 'legendary', emoji: '☄️' },
    { name: '🎇 Sparkler', rarity: 'uncommon', emoji: '🎇' },
    { name: '🌠 Star', rarity: 'rare', emoji: '🌠' },
    { name: '🧪 Potion', rarity: 'rare', emoji: '🧪' },
    { name: '🪎 Buried Treasure', rarity: 'epic', emoji: '🪎' },
    { name: '🌎 Planet', rarity: 'epic', emoji: '🌎' },
    { name: '🥥 Coconut', rarity: 'epic', emoji: '🥥' },
    { name: '⚡ Lightning Bolt', rarity: 'legendary', emoji: '⚡' },
    { name: '🔥 Fire Essence', rarity: 'legendary', emoji: '🔥' },
    { name: '🧊 Ice Shard', rarity: 'legendary', emoji: '🧊' },
    { name: '🫍 Orca', rarity: 'mythic', emoji: '🫍' },
    { name: '🍀 4 Leaf Clover', rarity: 'mythic', emoji: '🍀' },
    { name: '🧙‍♂️ Necromancer', rarity: 'mythic', emoji: '🧙‍♂️' },
    { name: '🦖 Dinosaur', rarity: 'mythic', emoji: '🦖' },
    { name: '🐉 Dragon', rarity: 'exotic', emoji: '🐉' },
    { name: '🦄 Unicorn', rarity: 'exotic', emoji: '🦄' },
    { name: '👽 Alien', rarity: 'exotic', emoji: '👽' },
    { name: '🐦‍🔥 Phoenix', rarity: 'exotic', emoji: '🐦‍🔥' },
    { name: '🫈 Big Foot', rarity: 'secret', emoji: '🫈' },
    { name: '🧹 Witch', rarity: 'secret', emoji: '🧹' },
    { name: '👻 Ghost', rarity: 'secret', emoji: '👻' },
    { name: '🤡 Clown', rarity: 'secret', emoji: '🤡' },
    { name: '🥖 Chicken Bake', rarity: 'limited', emoji: '🥖' },
    { name: '🍪 Triple Chunk Chocolate Chip Cookie', rarity: 'limited', emoji: '🍪' },
    { name: '👵🏻 Bazooka Granny', rarity: 'limited', emoji: '👵🏻' },
    { name: '🦭 Sea Lion', rarity: 'limited', emoji: '🦭' }
  ];
  const rarityWeights = {
    common: 65,
    uncommon: 13,
    rare: 9,
    epic: 7,
    legendary: 4,
    mythic: 1,
    exotic: 0.5,
    secret: 0.1,
    limited: 0
  };

  let totalPulls = 0;
  let pullHistory = [];
  let currentPull = [];
  let bestRarity = 'none';
  const rarityRank = { common: 1, uncommon: 2, rare: 3, epic: 4, legendary: 5, mythic: 6, exotic: 7, secret: 8, limited: 9 };

  function updateBestRarity(item) {
    const itemRank = rarityRank[item.rarity] || 0;
    const currentRank = rarityRank[bestRarity] || 0;
    if (itemRank > currentRank) {
      bestRarity = item.rarity;
    }
  }

  let collectedAuras = new Set();
  let rerollCooldown = false;

  function updateCollectionModal() {
    const categoriesContainer = document.getElementById('aura-categories');
    const buttonsContainer = document.getElementById('category-buttons');
    categoriesContainer.innerHTML = '';
    buttonsContainer.innerHTML = '';
    
    const rarities = ['common', 'uncommon', 'rare', 'epic', 'legendary', 'mythic', 'exotic', 'secret', 'limited'];
    
    // Create category buttons
    rarities.forEach((rarity, index) => {
      const btn = document.createElement('button');
      btn.className = 'category-btn ' + rarity + (index === 0 ? ' active' : '');
      btn.textContent = rarity.charAt(0).toUpperCase() + rarity.slice(1);
      btn.addEventListener('click', () => switchCategory(rarity, btn));
      buttonsContainer.appendChild(btn);
    });
    
    // Create category sections
    rarities.forEach((rarity, index) => {
      const section = document.createElement('div');
      section.className = 'aura-category' + (index === 0 ? ' active' : '');
      section.id = `category-${rarity}`;
      
      const table = document.createElement('div');
      table.className = 'aura-table';
      
      items.forEach((item, itemIndex) => {
        if (item.rarity !== rarity) return;
        
        const row = document.createElement('div');
        row.className = 'aura-row';
        
        // Check if this is an uncollected secret item
        const isUnlockedSecret = item.rarity === 'secret' && !collectedAuras.has(itemIndex);
        
        // Calculate drop chance
        const rarityWeight = rarityWeights[item.rarity];
        const itemsInRarity = items.filter(i => i.rarity === item.rarity).length;
        const chance = ((rarityWeight / 100) / itemsInRarity);
        const chancePercent = (chance * 100).toFixed(2);
        
        const collected = collectedAuras.has(itemIndex) ? '✓ Collected' : '—';
        const collectedClass = collectedAuras.has(itemIndex) ? 'aura-collected' : '';
        
        const emoji = isUnlockedSecret ? '❓' : item.emoji;
        const name = isUnlockedSecret ? '???' : item.name;
        const displayChance = isUnlockedSecret ? '???' : chancePercent + '%';
        
        row.innerHTML = `
          <div class="aura-emoji">${emoji}</div>
          <div class="aura-name">${name}</div>
          <div class="aura-rarity">${item.rarity.toUpperCase()}</div>
          <div class="aura-chance">${displayChance}</div>
          <div class="${collectedClass}">${collected}</div>
        `;
        
        table.appendChild(row);
      });
      
      section.appendChild(table);
      categoriesContainer.appendChild(section);
    });
  }
  
  function switchCategory(rarity, button) {
    // Hide all categories
    document.querySelectorAll('.aura-category').forEach(cat => cat.classList.remove('active'));
    document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
    
    // Show selected category
    document.getElementById(`category-${rarity}`).classList.add('active');
    button.classList.add('active');
  }

  function openCollectionModal() {
    updateCollectionModal();
    document.getElementById('collection-modal').classList.add('active');
  }

  function closeCollectionModal() {
    document.getElementById('collection-modal').classList.remove('active');
  }

  function getRandomItem() {
    const rand = Math.random() * 100;
    let cumulative = 0;
    
    for (const [rarity, weight] of Object.entries(rarityWeights)) {
      cumulative += weight;
      if (rand <= cumulative) {
        const itemsOfRarity = items.filter(i => i.rarity === rarity);
        return itemsOfRarity[Math.floor(Math.random() * itemsOfRarity.length)];
      }
    }
    return items[0];
  }

  function displayPull(items) {
    const display = document.getElementById('pull-display');
    display.innerHTML = '';
    
    if (items.length === 1) {
      const item = items[0];
      display.innerHTML = `
        <div class="item-card rarity-${item.rarity}">${item.emoji}</div>
        <div class="item-name">${item.name}</div>
        <div class="rarity-label rarity-${item.rarity}-text">${item.rarity.toUpperCase()}</div>
      `;
    } else {
      display.innerHTML = '<p style="color:#fff; margin-bottom:15px;">Pull Results:</p>';
      const grid = document.createElement('div');
      grid.style.display = 'grid';
      grid.style.gridTemplateColumns = 'repeat(5, 1fr)';
      grid.style.gap = '10px';
      grid.style.width = '100%';
      
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = `item-card rarity-${item.rarity}`;
        card.textContent = item.emoji;
        grid.appendChild(card);
      });
      
      display.appendChild(grid);
    }
  }

  function updateStats() {
    document.getElementById('total-pulls').textContent = totalPulls;
    document.getElementById('best-rarity').textContent = bestRarity.charAt(0).toUpperCase() + bestRarity.slice(1);
  }

  function saveProgress() {
    const data = {
      totalPulls,
      pullHistory,
      bestRarity,
      collectedAuras: Array.from(collectedAuras)
    };
    localStorage.setItem('auraRngProgress', JSON.stringify(data));
  }

  function loadProgress() {
    const saved = localStorage.getItem('auraRngProgress');
    if (saved) {
      const data = JSON.parse(saved);
      totalPulls = data.totalPulls || 0;
      pullHistory = data.pullHistory || [];
      bestRarity = data.bestRarity || 'none';
      collectedAuras = new Set(data.collectedAuras || []);
    }
  }

  function pull(count) {
    totalPulls += count;
    currentPull = [];
    
    for (let i = 0; i < count; i++) {
      const item = getRandomItem();
      currentPull.push(item);
      pullHistory.push(item);
      updateBestRarity(item);
      
      // Mark as collected
      const itemIndex = items.findIndex(it => it.emoji === item.emoji && it.rarity === item.rarity);
      if (itemIndex !== -1) {
        collectedAuras.add(itemIndex);
      }
    }
    
    displayPull(currentPull);
    updateStats();
    saveProgress();
    
    // Show reroll button
    document.getElementById('pull-1').style.display = 'none';
    document.getElementById('reroll-btn').style.display = 'inline-block';
  }

  function reroll() {
    if (rerollCooldown) return;
    
    rerollCooldown = true;
    const btn = document.getElementById('reroll-btn');
    btn.disabled = true;
    btn.style.opacity = '0.5';
    
    let timeLeft = 1.5;
    btn.textContent = `Reroll (${timeLeft.toFixed(1)}s)`;
    
    const interval = setInterval(() => {
      timeLeft -= 0.1;
      if (timeLeft <= 0) {
        clearInterval(interval);
        rerollCooldown = false;
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.textContent = 'Reroll';
      } else {
        btn.textContent = `Reroll (${timeLeft.toFixed(1)}s)`;
      }
    }, 100);
    
    pull(currentPull.length);
  }

  function backToPull() {
    document.getElementById('pull-1').style.display = 'inline-block';
    document.getElementById('reroll-btn').style.display = 'none';
  }

  document.getElementById('pull-1').addEventListener('click', () => pull(1));
  document.getElementById('reroll-btn').addEventListener('click', reroll);
  document.getElementById('view-collection-btn').addEventListener('click', openCollectionModal);
  document.getElementById('close-modal').addEventListener('click', closeCollectionModal);
  
  // Close modal when clicking outside
  document.getElementById('collection-modal').addEventListener('click', (e) => {
    if (e.target.id === 'collection-modal') closeCollectionModal();
  });

  loadProgress();
  updateStats();
  updateCollectionModal();
  </script>
</body>
</html>

<body>
  <style>
  .side-text { color:#fff; font-size:24px; font-weight:bold; max-width:200px; text-align:left; } 
  </style>
  <div class="side-text">Scrumptious studios</div>
